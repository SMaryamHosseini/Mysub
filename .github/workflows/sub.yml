name: Build VLESS Subscription

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v3

      - name: Clone source repo
        run: |
          rm -rf repo
          git clone --depth=1 https://github.com/HadiDastangoo/TelegramV2RayExtractor.git repo

      - name: Read single vless file (FIX)
        run: |
          cat repo/subscriptions/vless > all.txt

      - name: Normalize & filter VLESS
        run: |
          tr -d '\r' < all.txt | grep -oE 'vless://[^[:space:]]+' > vless.txt || true

      - name: Remove duplicates
        run: |
          sort -u vless.txt > clean.txt

      - name: Ensure not empty
        run: |
          if [ ! -s clean.txt ]; then
            echo "vless://dummy" > clean.txt
          fi

      - name: Convert to Base64
        run: |
          base64 clean.txt > sub.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push
