name: Build VLESS Subscription

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Clone repo
        run: |
          git clone --depth=1 https://github.com/HadiDastangoo/TelegramV2RayExtractor.git repo

      - name: Read file
        run: |
          cat repo/subscriptions/vless > all.txt

      - name: Extract VLESS
        run: |
          grep -oE 'vless://[^[:space:]]+' all.txt > clean.txt || true

      - name: Remove duplicates
        run: |
          sort -u clean.txt > final.txt

      - name: Convert
        run: |
          base64 final.txt > sub.txt

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update" || echo "no change"
          git push
