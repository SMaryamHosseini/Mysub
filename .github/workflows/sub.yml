name: Build VLESS Subscription

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch file list from GitHub API
        run: |
          curl -s https://api.github.com/repos/HadiDastangoo/TelegramV2RayExtractor/contents/subscriptions/vless > files.json

      - name: Extract download URLs
        run: |
          cat files.json | grep download_url | cut -d '"' -f 4 > urls.txt

      - name: Download and merge all
        run: |
          > all.txt
          while read url; do
            curl -s "$url" >> all.txt
            echo "" >> all.txt
          done < urls.txt

      - name: Filter valid VLESS
        run: |
          grep '^vless://' all.txt > vless.txt || true

      - name: Remove duplicates
        run: |
          sort vless.txt | uniq > clean.txt

      - name: Ensure not empty
        run: |
          if [ ! -s clean.txt ]; then
            echo "vless://dummy" > clean.txt
          fi

      - name: Convert to Base64
        run: |
          base64 clean.txt > sub.txt

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push
