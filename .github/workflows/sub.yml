name: Clean VLESS Subscription

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v3

      - name: Clone source repo
        run: |
          git clone https://github.com/HadiDastangoo/TelegramV2RayExtractor.git repo

      - name: Merge safely
        run: |
          find repo/subscriptions/vless -type f -name "*.txt" -exec cat {} + > all.txt || true

      - name: Ensure file exists
        run: |
          touch all.txt

      - name: Filter valid VLESS
        run: |
          grep '^vless://' all.txt > vless.txt || true

      - name: Remove duplicates
        run: |
          sort vless.txt | uniq > clean.txt || true

      - name: Remove empty lines
        run: |
          sed '/^$/d' clean.txt > final.txt || true

      - name: Check if empty
        run: |
          if [ ! -s final.txt ]; then
            echo "No valid VLESS found" > final.txt
          fi

      - name: Convert to Base64
        run: |
          base64 final.txt > sub.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push
