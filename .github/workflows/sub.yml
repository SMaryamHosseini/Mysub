name: Build VLESS Subscription

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone --depth=1 https://github.com/HadiDastangoo/TelegramV2RayExtractor.git repo

      - name: Read VLESS file
        run: |
          cat repo/subscriptions/vless > all.txt

      - name: Extract clean VLESS links
        run: |
          grep -oE 'vless://[^ ]+' all.txt | cut -d '#' -f 1 > clean.txt || true

      - name: Remove duplicates
        run: |
          sort -u clean.txt > final.txt

      - name: Ensure not empty
        run: |
          if [ ! -s final.txt ]; then
            echo "vless://dummy" > final.txt
          fi

      - name: Convert to Base64
        run: |
          base64 final.txt > sub.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push
